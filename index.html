<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rinamiru - Payment Methods</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-container">
    <div class="background-pattern"></div>
    
    <div class="card-container">
      <div class="card">
        <!-- Header with character -->
        <div class="card-header">
          <div class="character-circle">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23d4a5b7'/%3E%3Ccircle cx='35' cy='40' r='8' fill='%23333'/%3E%3Ccircle cx='65' cy='40' r='8' fill='%23333'/%3E%3Cpath d='M 40 55 Q 50 60 60 55' stroke='%23333' stroke-width='2' fill='none'/%3E%3C/svg%3E" alt="Character">
          </div>
          <h1 class="title">Rinamiru</h1>
          <p class="subtitle">✨ ชอบการให้เงิน ✨</p>
        </div>

        <!-- Payment Methods -->
        <div class="payment-section">
          <!-- SCB -->
          <div class="payment-item">
            <div class="payment-label">
              <span class="icon">🏦</span>
              <span class="text">ไทยพาณิชย์(SCB)</span>
            </div>
            <button class="copy-btn" onclick="copyItem('scb-btn', 'xxx-xxx-xxxx', 'ไทยพาณิชย์(SCB)')">
              <span class="copy-icon">📋</span>
            </button>
          </div>

          <!-- Wallet -->
          <div class="payment-item">
            <div class="payment-label">
              <span class="icon">💳</span>
              <span class="text">Wallet (+เบิก 58)</span>
            </div>
            <button class="copy-btn" onclick="copyItem('wallet-btn', 'xxx-xxx-xxxx', 'Wallet (+เบิก 58)')">
              <span class="copy-icon">📋</span>
            </button>
          </div>

          <!-- BCEL One -->
          <div class="payment-item">
            <div class="payment-label">
              <span class="icon">🏧</span>
              <span class="text">BCEL One (Laos)</span>
            </div>
            <button class="copy-btn" onclick="copyAndDownloadBcel('xxx-xxx-xxxx', 'BCEL One (Laos)')">
              <span class="copy-icon">⬇️</span>
            </button>
            <a id="bcel-download-link" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f0f0f0'/%3E%3Ctext x='50' y='50' text-anchor='middle' dominant-baseline='middle'%3EQR Code%3C/text%3E%3C/svg%3E" download="bcel-qr.png" style="display: none;"></a>
          </div>

          <!-- Bank Notes -->
          <div class="payment-item">
            <div class="payment-label">
              <span class="icon">💵</span>
              <span class="text">โปรตีลิป(ปล่อยใจไล่)</span>
            </div>
            <button class="copy-btn" onclick="copyItem('bank-btn', 'xxx-xxx-xxxx', 'โปรตีลิป(ปล่อยใจไล่)')">
              <span class="copy-icon">📋</span>
            </button>
          </div>
        </div>

        <!-- Decorative Hearts -->
        <div class="hearts">.. 💜 ..</div>

        <!-- Footer -->
        <div class="card-footer">
          <p class="footer-text">สำหารับรับคำขอบคุณของแฟนชุมชน ^</p>
          <p class="credits-text">ขอบคุณการสนับสนุน<br>Facebook: Rinamiru<br>Line Official: @015deddy</p>
          <p class="support-text">ของทุกการไม่อยู่สำหรับรับ Rinamiru เพล่นั้น</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
